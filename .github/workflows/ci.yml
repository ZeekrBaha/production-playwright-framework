name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, unit tests, build, e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/workbench/package-lock.json
            e2e/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm run ci:install

      - name: Lint
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Typecheck (app + e2e)
        run: npm run typecheck

      - name: Unit tests (domain layer)
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Playwright e2e tests (visual tests excluded — baselines are platform-specific)
        run: npm run test:ci --prefix e2e

      - name: Audit dependencies (advisory)
        run: |
          npm audit --audit-level=high --prefix apps/workbench || true
          npm audit --audit-level=high --prefix e2e || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Upload test results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: e2e/test-results
          retention-days: 14
